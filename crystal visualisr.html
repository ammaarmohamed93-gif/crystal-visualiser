<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Visualiser</title>
    <style>
        /* Styles for the canvas and layout */
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; }
        canvas { border: 1px solid #ccc; }
    </style>
</head>
<body>
    <canvas id="crystalCanvas" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('crystalCanvas');
        const ctx = canvas.getContext('2d');

        // Function to draw a crystal - Improved for better visualization
        function drawCrystal(x, y, size) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            // Draw a simple triangle to represent a crystal
            ctx.lineTo(x + size, y + size * 2);
            ctx.lineTo(x - size, y + size * 2);
            ctx.closePath();
            ctx.fillStyle = '#00f'; // Blue color for crystals
            ctx.fill();
        }

        // Improved error handling for drawing
        function renderCrystals() {
            try {
                ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear previous frame
                for (let i = 0; i < 5; i++) {
                    drawCrystal(Math.random() * canvas.width, Math.random() * (canvas.height - 30), 20);
                }
            } catch (error) {
                console.error('Error rendering crystals:', error);
            }
        }

        // Main render loop
        setInterval(renderCrystals, 1000); // Update every second
    </script>
</body>
</html>
