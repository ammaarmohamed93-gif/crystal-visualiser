<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Visualizer Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a2e; color: #e2e8f0; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* UI Overlay floating on top of the 3D canvas */
        .ui-panel {
            position: absolute; z-index: 10;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #controls { top: 20px; left: 20px; width: 320px; padding: 20px; border-radius: 12px; }
        #chat-panel { bottom: 20px; right: 20px; width: 400px; height: 500px; border-radius: 12px; display: flex; flex-direction: column; }
        
        #chat-history { flex-grow: 1; overflow-y: auto; padding: 15px; font-size: 0.9rem; }
        .message { margin-bottom: 12px; padding: 10px; border-radius: 8px; }
        .user-msg { background: #3b82f6; color: white; margin-left: 20px; }
        .ai-msg { background: #334155; margin-right: 20px; }
        
        /* Scrollbar styling because default scrollbars are ugly */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="controls" class="ui-panel shadow-lg">
        <h1 class="text-2xl font-bold mb-4 text-blue-400">Crystalizer Pro</h1>
        
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Lattice Type</label>
            <select id="latticeType" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white outline-none focus:border-blue-500 transition">
                <option value="sc">Simple Cubic (SC)</option>
                <option value="bcc">Body-Centered Cubic (BCC)</option>
                <option value="fcc" selected>Face-Centered Cubic (FCC)</option>
                <option value="hcp">Hexagonal Close-Packed (HCP)</option>
            </select>
        </div>

        <div class="mb-4 flex items-center justify-between bg-slate-800 p-2 rounded border border-slate-600">
            <span class="text-sm font-medium">Space-Filling Mode</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="spaceFillingToggle" class="sr-only peer">
                <div class="w-11 h-6 bg-slate-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500"></div>
            </label>
        </div>

        <hr class="border-slate-600 my-4">

        <h2 class="text-lg font-bold mb-2 text-purple-400">Planar Density (hkl)</h2>
        <div class="flex gap-2 mb-2">
            <input type="number" id="millerH" value="1" min="0" max="2" class="w-1/3 bg-slate-800 border border-slate-600 rounded p-1 text-center">
            <input type="number" id="millerK" value="1" min="0" max="2" class="w-1/3 bg-slate-800 border border-slate-600 rounded p-1 text-center">
            <input type="number" id="millerL" value="1" min="0" max="2" class="w-1/3 bg-slate-800 border border-slate-600 rounded p-1 text-center">
        </div>
        <button id="calcDensityBtn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded transition">
            Calculate Plane
        </button>
        <div id="densityResult" class="mt-3 text-sm text-gray-300 hidden bg-slate-800 p-2 rounded"></div>
    </div>

    <div id="chat-panel" class="ui-panel shadow-lg">
        <div class="bg-slate-800 p-3 rounded-t-xl border-b border-slate-600 flex justify-between items-center">
            <span class="font-bold text-emerald-400 flex items-center gap-2">
                <span>🤖</span> Prof. Lattice (AI)
            </span>
            <button id="apiKeyBtn" class="text-xs bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded transition">Set API Key</button>
        </div>
        
        <div id="chat-history">
            <div class="message ai-msg">
                Welcome to the lab! I'm Professor Lattice. I get overly excited about packing efficiencies and slip planes. What material structure are we analyzing today?
            </div>
        </div>

        <div class="p-3 bg-slate-800 rounded-b-xl border-t border-slate-600 flex gap-2">
            <input type="text" id="chatInput" placeholder="Ask about APF, Miller indices..." class="flex-grow bg-slate-700 border border-slate-600 rounded p-2 text-white outline-none focus:border-emerald-500 transition">
            <button id="sendBtn" class="bg-emerald-600 hover:bg-emerald-700 px-4 py-2 rounded font-bold transition">Send</button>
        </div>
    </div>

    <script>
        // --- 1. GLOBALS & STATE ---
        let scene, camera, renderer, controls, atomGroup;
        let isSpaceFilling = false;
        let currentLattice = 'fcc';
        let geminiApiKey = localStorage.getItem('gemini_api_key') || '';

        // Standard lattice parameter 'a' for visualization purposes
        const a = 10; 
        
        // Radius calculations based on lattice type to ensure atoms touch in space-filling mode
        const radii = {
            sc: a / 2,                // a = 2R
            bcc: (Math.sqrt(3) * a) / 4, // a = 4R/√3
            fcc: (Math.sqrt(2) * a) / 4, // a = 2R√2
            hcp: a / 2                // Simplified ideal c/a ratio handling for vis
        };

        // --- 2. THREE.JS SETUP ---
        function init3D() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(25, 20, 30);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Let there be light
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 40, 20);
            scene.add(dirLight);

            // Add a subtle grid to ground the visualization
            const gridHelper = new THREE.GridHelper(40, 40, 0x475569, 0x1e293b);
            gridHelper.position.y = -a/2 - 2;
            scene.add(gridHelper);

            atomGroup = new THREE.Group();
            scene.add(atomGroup);

            window.addEventListener('resize', onWindowResize, false);
            
            buildLattice();
            animate();
        }

        // --- 3. LATTICE GENERATION LOGIC ---
        // Generates the coordinates for the atoms based on the chosen unit cell
        function getLatticePositions(type) {
            const positions = [];
            // Helper to add corners to cubic cells
            const addCorners = () => {
                for(let x=0; x<=1; x++) 
                    for(let y=0; y<=1; y++) 
                        for(let z=0; z<=1; z++) 
                            positions.push([x, y, z]);
            };

            if (type === 'sc') {
                addCorners();
            } else if (type === 'bcc') {
                addCorners();
                positions.push([0.5, 0.5, 0.5]); // Center atom
            } else if (type === 'fcc') {
                addCorners();
                // Face centers
                positions.push([0.5, 0.5, 0], [0.5, 0.5, 1], [0.5, 0, 0.5], [0.5, 1, 0.5], [0, 0.5, 0.5], [1, 0.5, 0.5]);
            } else if (type === 'hcp') {
                // HCP is a hexagonal prism. We approximate the visual for the unit cell.
                // c/a ideal ratio is ~1.633
                const c = a * 1.633; 
                const height = c / a; // normalized to 'a'
                
                // Bottom Hexagon + center
                for(let i=0; i<6; i++) {
                    const angle = (i * Math.PI) / 3;
                    positions.push([Math.cos(angle), 0, Math.sin(angle)]);
                    positions.push([Math.cos(angle), height, Math.sin(angle)]); // Top Hexagon
                }
                positions.push([0, 0, 0]); // Bottom center
                positions.push([0, height, 0]); // Top center
                
                // Middle layer (3 atoms inside the prism)
                positions.push([Math.cos(Math.PI/6)*0.5, height/2, Math.sin(Math.PI/6)*0.5]);
                positions.push([Math.cos(5*Math.PI/6)*0.5, height/2, Math.sin(5*Math.PI/6)*0.5]);
                positions.push([Math.cos(9*Math.PI/6)*0.5, height/2, Math.sin(9*Math.PI/6)*0.5]);
            }
            return positions;
        }

        function buildLattice() {
            // Clean up old atoms
            while(atomGroup.children.length > 0){ 
                const child = atomGroup.children[0];
                child.geometry.dispose();
                child.material.dispose();
                atomGroup.remove(child); 
            }

            const positions = getLatticePositions(currentLattice);
            
            // Base radius for standard view vs space-filling view
            let targetRadius = radii[currentLattice];
            let actualRadius = isSpaceFilling ? targetRadius : targetRadius * 0.4;

            // Setup material - looks a bit metallic/shiny
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x3b82f6, 
                metalness: 0.3,
                roughness: 0.4 
            });
            const geometry = new THREE.SphereGeometry(actualRadius, 32, 32);

            positions.forEach(pos => {
                const sphere = new THREE.Mesh(geometry, material);
                
                if(currentLattice === 'hcp') {
                    // HCP uses different scaling because the coordinates were generated differently above
                    sphere.position.set(pos[0] * a, pos[1] * a - (a*1.633/2), pos[2] * a);
                } else {
                    // Cubic scaling (centering the lattice at 0,0,0)
                    sphere.position.set((pos[0] - 0.5) * a, (pos[1] - 0.5) * a, (pos[2] - 0.5) * a);
                }
                atomGroup.add(sphere);
            });

            // Draw unit cell wireframe box for cubic systems
            if(currentLattice !== 'hcp') {
                const boxGeo = new THREE.BoxGeometry(a, a, a);
                const edges = new THREE.EdgesGeometry(boxGeo);
                const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
                const line = new THREE.LineSegments(edges, lineMat);
                atomGroup.add(line);
            }
        }

        // --- 4. PLANAR DENSITY LOGIC ---
        function calculatePlanarDensity() {
            const h = document.getElementById('millerH').value;
            const k = document.getElementById('millerK').value;
            const l = document.getElementById('millerL').value;
            const plane = `(${h}${k}${l})`;
            const resultDiv = document.getElementById('densityResult');
            
            let resultHTML = `Calculating for plane <strong>${plane}</strong> in ${currentLattice.toUpperCase()}:<br>`;
            
            // Hardcoded common logic to keep JS fast, offload complex stuff to AI
            if (currentLattice === 'fcc' && plane === '(111)') {
                resultHTML += `Atoms: 2 (1 center + 3/6 corners + 3/2 edges)<br>`;
                resultHTML += `Formula: $PD = \\frac{4}{\\sqrt{3}a^2}$`;
            } else if (currentLattice === 'bcc' && plane === '(110)') {
                resultHTML += `Atoms: 2 (1 center + 4/4 corners)<br>`;
                resultHTML += `Formula: $PD = \\frac{2}{\\sqrt{2}a^2}$`;
            } else if (currentLattice === 'sc' && plane === '(100)') {
                resultHTML += `Atoms: 1 (4 corners * 1/4)<br>`;
                resultHTML += `Formula: $PD = \\frac{1}{a^2}$`;
            } else {
                resultHTML += `<em>Complex plane detected. Ask Prof. Lattice for the step-by-step derivation!</em>`;
            }

            resultDiv.innerHTML = resultHTML;
            resultDiv.classList.remove('hidden');
            
            // Render the LaTeX math
            renderMathInElement(resultDiv, {
                delimiters: [ {left: "$", right: "$", display: false} ]
            });
        }

        // --- 5. AI INTEGRATION (GEMINI API) ---
        async function callGemini(message) {
            if (!geminiApiKey) return "Error: Please set your Gemini API Key first by clicking the button in the top right of the chat.";

            // The 'Spicy' Professor System Prompt
            const systemInstruction = `You are Prof. Lattice, an eccentric and highly enthusiastic university professor of materials science. 
            You absolutely love atomic packing, crystallography, and defect structures. 
            You speak with passion, occasionally using slight dramatic flair when talking about things like close-packed planes.
            The user is currently viewing a ${currentLattice.toUpperCase()} lattice in a 3D visualizer.
            Keep explanations concise but deeply informative. 
            CRITICAL: You MUST format all mathematical formulas using LaTeX delimiters. Use $ for inline math (e.g., $a = 2R$) and $$ for block math.`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiApiKey}`;
            
            const payload = {
                systemInstruction: { parts: [{ text: systemInstruction }] },
                contents: [{ parts: [{ text: message }] }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                console.error("API Error:", error);
                return `*Sigh* The department's network must be down again. (Error: ${error.message})`;
            }
        }

        async function handleChat() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if(!message) return;

            // Add User message
            appendMessage(message, 'user-msg');
            input.value = '';

            // Loading state
            const loadingId = appendMessage('...', 'ai-msg');
            
            // Fetch AI response
            const responseText = await callGemini(message);
            
            // Update UI with response
            const msgEl = document.getElementById(loadingId);
            msgEl.innerHTML = marked.parse(responseText);
            
            // Trigger KaTeX to render math in the newly added message
            renderMathInElement(msgEl, {
                delimiters: [
                    {left: "$$", right: "$$", display: true},
                    {left: "$", right: "$", display: false}
                ]
            });
            
            scrollToBottom();
        }

        function appendMessage(text, className) {
            const id = 'msg-' + Date.now();
            const history = document.getElementById('chat-history');
            const div = document.createElement('div');
            div.id = id;
            div.className = `message ${className}`;
            div.textContent = text; // Just text for now, parsed later for AI msgs
            history.appendChild(div);
            scrollToBottom();
            return id;
        }

        function scrollToBottom() {
            const history = document.getElementById('chat-history');
            history.scrollTop = history.scrollHeight;
        }

        // --- 6. EVENT LISTENERS ---
        document.getElementById('latticeType').addEventListener('change', (e) => {
            currentLattice = e.target.value;
            buildLattice();
        });

        document.getElementById('spaceFillingToggle').addEventListener('change', (e) => {
            isSpaceFilling = e.target.checked;
            buildLattice();
        });

        document.getElementById('calcDensityBtn').addEventListener('click', calculatePlanarDensity);

        document.getElementById('sendBtn').addEventListener('click', handleChat);
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') handleChat();
        });

        document.getElementById('apiKeyBtn').addEventListener('click', () => {
            const key = prompt("Enter your Google Gemini API Key:\n(It is stored locally in your browser, not sent to any server except Google's API)");
            if(key) {
                geminiApiKey = key.trim();
                localStorage.setItem('gemini_api_key', geminiApiKey);
                alert("API Key saved securely in your browser's local storage.");
            }
        });

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Boot it up
        init3D();
    </script>
</body>
</html>
